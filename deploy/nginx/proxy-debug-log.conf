# Installed to /etc/nginx/conf.d/proxy-debug-log.conf
# Per-proxy access logs use this format (see nginx_writer.py).

log_format proxy_debug '$remote_addr|$time_local|$host|$request|$status|$body_bytes_sent|$request_length|$upstream_bytes_received|$upstream_bytes_sent|$http_x_forwarded_for|$http_user_agent|$request_time|$upstream_response_time';
