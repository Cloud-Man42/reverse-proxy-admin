# Admin UI vhost for Docker deployments (port 8443).
# Restrict access at the host firewall; these allows cover common private networks.

server {
    listen 8443 ssl;
    server_name nginx-admin.local;

    ssl_certificate     /etc/ssl/certs/nginx-admin.crt;
    ssl_certificate_key /etc/ssl/private/nginx-admin.key;

    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
