name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Prepare CI directories
        run: |
          mkdir -p /tmp/reverse-proxy-admin-ci/{data,backups,certbot/work,certbot/logs,sites-available,sites-enabled,htpasswd,logs,letsencrypt/live}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        env:
          ADMIN_PASSWORD: test-password
          ADMIN_USERNAME: admin
          USE_SUDO: "false"
          DATABASE_URL: sqlite:////tmp/reverse-proxy-admin-ci/test.db
          DATA_DIR: /tmp/reverse-proxy-admin-ci/data
          BACKUP_DIR: /tmp/reverse-proxy-admin-ci/backups
          CERTBOT_WORK_DIR: /tmp/reverse-proxy-admin-ci/certbot/work
          CERTBOT_LOGS_DIR: /tmp/reverse-proxy-admin-ci/certbot/logs
          NGINX_SITES_AVAILABLE: /tmp/reverse-proxy-admin-ci/sites-available
          NGINX_SITES_ENABLED: /tmp/reverse-proxy-admin-ci/sites-enabled
          HTPASSWD_DIR: /tmp/reverse-proxy-admin-ci/htpasswd
          NGINX_ERROR_LOG: /tmp/reverse-proxy-admin-ci/logs/error.log
          NGINX_ACCESS_LOG: /tmp/reverse-proxy-admin-ci/logs/access.log
          LETSENCRYPT_LIVE: /tmp/reverse-proxy-admin-ci/letsencrypt/live
          CERTBOT_CONFIG_DIR: /tmp/reverse-proxy-admin-ci/letsencrypt
          SCHEDULER_ENABLED: "false"
          ALEMBIC_UPGRADE: "false"
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm test
